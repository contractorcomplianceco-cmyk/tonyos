openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Executive Strategy Cockpit API for Rose OS / Command Center
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: executive
    description: Executive home summary and briefing
  - name: strategy
    description: Company strategy overview
  - name: decisions
    description: Major decision queue
  - name: financial
    description: Financial visibility
  - name: risk
    description: Risk and platform strategy
  - name: roadmap
    description: AI / platform roadmap
  - name: partnerships
    description: Strategic partnerships
  - name: milestones
    description: Founder involvement and milestones
  - name: reviews
    description: Monthly founder review
  - name: sources
    description: Company brain source records
  - name: guardrails
    description: CLP separation and authority guardrails
  - name: brands
    description: CAG parent company and brand portfolio
  - name: departments
    description: Brand department health
  - name: projects
    description: Brand and department projects
  - name: predictors
    description: Predictive intelligence modules
  - name: reviewers
    description: Known reviewer roster for note attribution
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /executive-summary:
    get:
      operationId: getExecutiveSummary
      tags: [executive]
      summary: Executive home headline metrics
      responses:
        "200":
          description: Executive summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveSummary"

  /briefing-items:
    get:
      operationId: getBriefingItems
      tags: [executive]
      summary: Top things Tony should know
      responses:
        "200":
          description: Briefing items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BriefingItem"

  /strategy-objectives:
    get:
      operationId: getStrategyObjectives
      tags: [strategy]
      summary: Company strategy objectives
      responses:
        "200":
          description: Strategy objectives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyObjective"

  /decisions:
    get:
      operationId: getDecisions
      tags: [decisions]
      summary: Major decision queue
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, declined, deferred]
      responses:
        "200":
          description: Decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Decision"

  /decisions/summary:
    get:
      operationId: getDecisionSummary
      tags: [decisions]
      summary: Decision queue aggregates
      responses:
        "200":
          description: Decision summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionSummary"

  /decisions/{id}:
    get:
      operationId: getDecision
      tags: [decisions]
      summary: Single decision detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /decisions/{id}/notes:
    get:
      operationId: getDecisionNotes
      tags: [decisions]
      summary: Founder participation notes on a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Decision notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DecisionNote"
    post:
      operationId: createDecisionNote
      tags: [decisions]
      summary: Add a founder participation note (recommend-only, not an approval)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionNoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionNote"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /decisions/{id}/notes/{noteId}:
    patch:
      operationId: updateDecisionNote
      tags: [decisions]
      summary: Edit a founder participation note (recommend-only, not an approval)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionNoteInput"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionNote"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteDecisionNote
      tags: [decisions]
      summary: Remove a founder participation note added in error
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Note deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reviewers:
    get:
      operationId: getReviewers
      tags: [reviewers]
      summary: Known reviewer roster for note attribution
      responses:
        "200":
          description: Reviewers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reviewer"
    post:
      operationId: createReviewer
      tags: [reviewers]
      summary: Add a reviewer to the roster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewerInput"
      responses:
        "201":
          description: Created reviewer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reviewer"
        "200":
          description: Existing reviewer with the same name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reviewer"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /financial-overview:
    get:
      operationId: getFinancialOverview
      tags: [financial]
      summary: Financial visibility overview (visibility only)
      responses:
        "200":
          description: Financial overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialOverview"

  /financial-monthly:
    get:
      operationId: getFinancialMonthly
      tags: [financial]
      summary: Monthly financial series for charts
      responses:
        "200":
          description: Monthly financial points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyFinancialPoint"

  /financial-commitments:
    get:
      operationId: getFinancialCommitments
      tags: [financial]
      summary: Major upcoming financial commitments
      responses:
        "200":
          description: Financial commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FinancialCommitment"

  /risk-items:
    get:
      operationId: getRiskItems
      tags: [risk]
      summary: Risk and platform strategy items
      responses:
        "200":
          description: Risk items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskItem"

  /roadmap-phases:
    get:
      operationId: getRoadmapPhases
      tags: [roadmap]
      summary: AI / platform roadmap phases
      responses:
        "200":
          description: Roadmap phases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoadmapPhase"

  /partnerships:
    get:
      operationId: getPartnerships
      tags: [partnerships]
      summary: Strategic partnerships
      responses:
        "200":
          description: Partnerships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partnership"

  /milestones:
    get:
      operationId: getMilestones
      tags: [milestones]
      summary: Founder involvement and milestones
      responses:
        "200":
          description: Milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"

  /monthly-reviews:
    get:
      operationId: getMonthlyReviews
      tags: [reviews]
      summary: Monthly founder reviews
      responses:
        "200":
          description: Monthly reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyReview"

  /monthly-reviews/{id}:
    get:
      operationId: getMonthlyReview
      tags: [reviews]
      summary: Single monthly review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monthly review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReview"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /source-records:
    get:
      operationId: getSourceRecords
      tags: [sources]
      summary: Company brain source records
      responses:
        "200":
          description: Source records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceRecord"

  /guardrails:
    get:
      operationId: getGuardrails
      tags: [guardrails]
      summary: Authority and CLP separation guardrails
      responses:
        "200":
          description: Guardrails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guardrail"

  /brands:
    get:
      operationId: getBrands
      tags: [brands]
      summary: CAG parent company and brand portfolio
      responses:
        "200":
          description: Brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"

  /brands/{code}:
    get:
      operationId: getBrand
      tags: [brands]
      summary: Single brand detail
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /brands/{code}/notes:
    get:
      operationId: getBrandNotes
      tags: [brands]
      summary: Founder participation notes on a brand
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Brand notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrandNote"
    post:
      operationId: createBrandNote
      tags: [brands]
      summary: Add a founder participation note to a brand (recommend-only, not an approval)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandNote"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /brands/{code}/notes/{noteId}:
    patch:
      operationId: updateBrandNote
      tags: [brands]
      summary: Edit a founder participation note on a brand (recommend-only, not an approval)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandNote"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteBrandNote
      tags: [brands]
      summary: Remove a founder participation note on a brand added in error
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Note deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /departments:
    get:
      operationId: getDepartments
      tags: [departments]
      summary: Brand department health
      parameters:
        - name: brand
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"

  /projects:
    get:
      operationId: getProjects
      tags: [projects]
      summary: Brand and department projects
      parameters:
        - name: brand
          in: query
          required: false
          schema:
            type: string
        - name: department
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Single project detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{id}/notes:
    get:
      operationId: getProjectNotes
      tags: [projects]
      summary: Founder participation notes on a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectNote"
    post:
      operationId: createProjectNote
      tags: [projects]
      summary: Add a founder participation note to a project (recommend-only, not an approval)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectNote"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{id}/notes/{noteId}:
    patch:
      operationId: updateProjectNote
      tags: [projects]
      summary: Edit a founder participation note on a project (recommend-only, not an approval)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectNote"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteProjectNote
      tags: [projects]
      summary: Remove a founder participation note on a project added in error
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Note deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /predictors:
    get:
      operationId: getPredictors
      tags: [predictors]
      summary: Predictive intelligence modules
      responses:
        "200":
          description: Predictors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Predictor"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Metric:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string
        unit:
          type: ["string", "null"]
        change:
          type: ["string", "null"]
        trend:
          type: ["string", "null"]
          description: up, down, or flat
        helper:
          type: ["string", "null"]

    ExecutiveSummary:
      type: object
      required:
        - companyPulse
        - collectedRetainedRevenue
        - operatingReserve
        - majorDecisionsPending
        - pulseTrend
      properties:
        companyPulse:
          $ref: "#/components/schemas/Metric"
        collectedRetainedRevenue:
          $ref: "#/components/schemas/Metric"
        operatingReserve:
          $ref: "#/components/schemas/Metric"
        majorDecisionsPending:
          $ref: "#/components/schemas/Metric"
        predictiveAlerts:
          oneOf:
            - $ref: "#/components/schemas/Metric"
            - type: "null"
        pulseTrend:
          type: array
          items:
            type: number

    BriefingItem:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: integer
        title:
          type: string
        detail:
          type: ["string", "null"]
        status:
          type: string
          description: on_track, watch, action_needed, in_progress
        category:
          type: ["string", "null"]
        sourceRecord:
          type: ["string", "null"]

    StrategyObjective:
      type: object
      required: [id, title, status, progress]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        owner:
          type: ["string", "null"]
        horizon:
          type: ["string", "null"]
        status:
          type: string
        progress:
          type: integer
        pillar:
          type: ["string", "null"]

    Decision:
      type: object
      required: [id, title, category, status, approvalType, dueDate, founderApprovalRequired]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
          description: The guardrail category the decision falls under
        approvalType:
          type: string
          description: needs_written_approval, budget_threshold, ip_platform_rights, financial_commitment, strategic
        estimatedImpact:
          type: ["string", "null"]
        dueDate:
          type: string
        status:
          type: string
          description: pending, approved, declined, deferred
        founderApprovalRequired:
          type: boolean
        recommendation:
          type: ["string", "null"]
        sourceRecord:
          type: ["string", "null"]
        authorityLabel:
          type: ["string", "null"]
        brandCode:
          type: ["string", "null"]

    DecisionSummary:
      type: object
      required: [total, pendingApproval, totalImpact, byApprovalType]
      properties:
        total:
          type: integer
        pendingApproval:
          type: integer
        totalImpact:
          type: string
        byApprovalType:
          type: array
          items:
            $ref: "#/components/schemas/CountByLabel"

    CountByLabel:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer

    NoteRevision:
      type: object
      required: [body, replacedAt]
      properties:
        body:
          type: string
        replacedAt:
          type: string

    DecisionNote:
      type: object
      required: [id, decisionId, author, body, createdAt, revisions]
      properties:
        id:
          type: integer
        decisionId:
          type: integer
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
          nullable: true
        revisions:
          type: array
          items:
            $ref: "#/components/schemas/NoteRevision"

    DecisionNoteInput:
      type: object
      required: [body]
      properties:
        author:
          type: string
        body:
          type: string
          minLength: 1

    Reviewer:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    ReviewerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    BrandNote:
      type: object
      required: [id, brandCode, author, body, createdAt, revisions]
      properties:
        id:
          type: integer
        brandCode:
          type: string
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
          nullable: true
        revisions:
          type: array
          items:
            $ref: "#/components/schemas/NoteRevision"

    ProjectNote:
      type: object
      required: [id, projectId, author, body, createdAt, revisions]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
          nullable: true
        revisions:
          type: array
          items:
            $ref: "#/components/schemas/NoteRevision"

    NoteInput:
      type: object
      required: [body]
      properties:
        author:
          type: string
        body:
          type: string
          minLength: 1

    FinancialOverview:
      type: object
      required: [metrics, reserveMonths, reserveTarget, revenueTriggerProgress]
      properties:
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/Metric"
        reserveMonths:
          type: number
        reserveTarget:
          type: number
        revenueTriggerProgress:
          type: integer
        bankSummaries:
          type: array
          items:
            $ref: "#/components/schemas/BankSummary"

    BankSummary:
      type: object
      required: [name, balance, note]
      properties:
        name:
          type: string
        balance:
          type: string
        note:
          type: string

    MonthlyFinancialPoint:
      type: object
      required: [month, actual, plan]
      properties:
        month:
          type: string
        actual:
          type: number
        plan:
          type: number

    FinancialCommitment:
      type: object
      required: [id, label, amount, dueDate, status]
      properties:
        id:
          type: integer
        label:
          type: string
        amount:
          type: string
        dueDate:
          type: string
        status:
          type: string
        approvalRequired:
          type: boolean

    RiskItem:
      type: object
      required: [id, name, category, severity, status]
      properties:
        id:
          type: integer
        name:
